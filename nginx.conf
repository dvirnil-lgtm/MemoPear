server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cloud Run terminates TLS and proxies plain HTTP to this container on
    # 8080, so nginx's own scheme/port are never what the client actually
    # connected on. Without this, nginx's automatic directory redirects
    # (e.g. /blog -> /blog/, since the prerendered build has a real blog/
    # directory) build an absolute Location header using its own view of
    # scheme+port, producing unreachable URLs like http://host:8080/blog/.
    # Relative redirects let the browser resolve against the real origin.
    absolute_redirect off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
